<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulador de CPU - Grupo 6</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Simulador de Planificación de CPU</h1>
    <p class="sub">Proyecto SO - Grupo 6 · Frontend conectado al backend Python</p>
  </header>

  <main>
    <section class="card">
      <h2>Entrada</h2>

      <label for="procesos">Procesos <small>(uno por línea: <code>PID,llegada,ráfaga,prioridad</code>)</small></label>
      <textarea id="procesos" rows="6" spellcheck="false">P1,0,5,1
P2,2,3,2
P3,4,1,3
P4,5,2,1</textarea>

      <div class="row">
        <div>
          <label for="algoritmo">Algoritmo</label>
          <select id="algoritmo">
            <option value="fcfs">FCFS</option>
            <option value="sjf">SJF</option>
            <option value="priority">Prioridad</option>
            <option value="rr">Round Robin</option>
          </select>
        </div>
        <div>
          <label for="quantum">Quantum <small>(solo RR)</small></label>
          <input type="number" id="quantum" min="1" value="3" />
        </div>
        <div>
          <label for="backend">Backend URL</label>
          <input type="text" id="backend" value="http://localhost:8000" />
        </div>
      </div>

      <button id="run">Simular</button>
      <div id="status" class="status"></div>
    </section>

    <section id="resultsCard" class="card hidden">
      <h2>Resultados</h2>
      <div id="results"></div>

      <h3>Métricas globales</h3>
      <div id="metricas" class="metricas"></div>

      <h3>Diagrama de Gantt</h3>
      <div id="gantt" class="gantt"></div>

      <h3>Respuesta cruda (JSON)</h3>
      <pre id="raw"></pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
